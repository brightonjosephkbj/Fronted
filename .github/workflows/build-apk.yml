name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Prebuild (generate native android project)
        run: npx expo prebuild --platform android --clean

      - name: Configure release signing
        run: python3 scripts/patch_gradle.py

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode release keystore
        run: echo "${{ secrets.B24_KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/b24-release.keystore

      - name: Build release APK
        working-directory: android
        env:
          B24_UPLOAD_STORE_FILE: ${{ github.workspace }}/b24-release.keystore
          B24_UPLOAD_STORE_PASSWORD: ${{ secrets.B24_KEYSTORE_PASSWORD }}
          B24_UPLOAD_KEY_ALIAS: ${{ secrets.B24_KEY_ALIAS }}
          B24_UPLOAD_KEY_PASSWORD: ${{ secrets.B24_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
