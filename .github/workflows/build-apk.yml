name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Add swap
        run: |
          sudo fallocate -l 4G /extra-swapfile
          sudo chmod 600 /extra-swapfile
          sudo mkswap /extra-swapfile
          sudo swapon /extra-swapfile
          free -h

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Prebuild (generate native android project)
        run: npx expo prebuild --platform android --clean

      - name: Configure Gradle memory settings
        run: |
          cat >> android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2560m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError
          kotlin.daemon.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=768m
          org.gradle.daemon=false
          org.gradle.parallel=false
          org.gradle.workers.max=1
          EOF
          echo '--- Final gradle.properties ---'
          cat android/gradle.properties

      - name: Debug node module resolution
        run: |
          node --version
          echo '--- react-native ---'
          node --print "require.resolve('react-native/package.json')"
          echo '--- expo entry ---'
          node -e "require('expo/scripts/resolveAppEntry')" || echo 'FAILED resolveAppEntry'
          echo '--- hermes ---'
          node --print "require.resolve('react-native/sdks/hermesc/osx-bin/hermesc')" || echo 'FAILED hermesc (may be expected on Linux)'
          echo '--- expo cli ---'
          node --print "require.resolve('@expo/cli/package.json')" || echo 'FAILED @expo/cli'

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode release keystore
        run: echo "${{ secrets.B24_KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/b24-release.keystore

      - name: Build release APK
        working-directory: android
        run: |
          ./gradlew assembleRelease --stacktrace --info \
            -PB24_UPLOAD_STORE_FILE=${{ github.workspace }}/b24-release.keystore \
            -PB24_UPLOAD_STORE_PASSWORD=${{ secrets.B24_KEYSTORE_PASSWORD }} \
            -PB24_UPLOAD_KEY_ALIAS=${{ secrets.B24_KEY_ALIAS }} \
            -PB24_UPLOAD_KEY_PASSWORD=${{ secrets.B24_KEY_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
